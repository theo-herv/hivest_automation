name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vérifications & tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification syntaxique des sources
        run: npm run check

      - name: Validation du jeu de données (emails.json)
        run: node -e "JSON.parse(require('fs').readFileSync('data/emails.json')); console.log('emails.json valide')"

      - name: Suite de tests (mockée, aucune clé API requise)
        run: npm test
